packages:
  - 'academy-ui'
  - 'base-ui'
  - 'defi-alerts'
  - 'x-news-ui'
  - 'insights-ui'
  - 'clickable-demos'
  - 'news-reader'
  - 'simulations'
  - 'shared/web-core'

# Dependency overrides. pnpm >= 10 reads these from pnpm-workspace.yaml (NOT package.json's
# "pnpm.overrides", which newer pnpm ignores). These mirror the root package.json "resolutions"
# (read by yarn/Vercel) and must stay in lockstep with the `overrides:` block in pnpm-lock.yaml,
# or `pnpm install --frozen-lockfile` (the Docker build) fails with ERR_PNPM_LOCKFILE_CONFIG_MISMATCH.
overrides:
  '@types/react': 18.3.12
  '@types/react-dom': 18.3.1
  react: 18.3.1
  react-dom: 18.3.1
  '@apollo/client': ^3.7.12

# Dependency build scripts pnpm is allowed to run. pnpm >= 10 blocks dependency
# postinstall/build scripts by default and errors in CI (ERR_PNPM_IGNORED_BUILDS) until
# they're explicitly approved here. These are all first-class app deps that genuinely need
# their build step (prisma client generation, native addons, etc.). Not tracked in
# pnpm-lock.yaml, so this does not affect the frozen-lockfile check.
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@prisma/client'
  - '@prisma/engines'
  - '@reown/appkit'
  - bufferutil
  - esbuild
  - keccak
  - prisma
  - protobufjs
  - puppeteer
  - sharp
  - unrs-resolver
  - utf-8-validate