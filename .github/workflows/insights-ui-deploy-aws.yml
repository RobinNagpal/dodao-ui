name: Deploy insights-ui (AWS / Lightsail)

# Builds the insights-ui container, pushes it to ECR, (optionally) uploads static assets to S3
# for deploy-skew safety, and rolls the Lightsail container service to the new image via
# `terraform apply` against deploy/aws/terraform-lightsail. See docs/insights-ui/aws-migration-plan.md.
# REPLACES koalagains-deploy-full-ssg.yml at cut-over; until then it is opt-in via dispatch.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        type: choice
        default: production
        options: [production]

permissions:
  id-token: write # GitHub OIDC → AWS role
  contents: read

concurrency:
  group: insights-ui-aws-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: insights-ui
  STATIC_BUCKET: insights-ui-static-assets
  TF_DIR: insights-ui/deploy/aws/terraform-lightsail
  APP_SECRETS_ID: insights-ui/app-env # Secrets Manager JSON consumed as the app_secrets map

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ECR repo is a Terraform resource — create it first so `docker push` has a target.
      - name: Terraform init + ensure ECR repo
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          # app_secrets is required but irrelevant to the ECR resource — pass an empty map so
          # the targeted apply doesn't prompt. The full apply below passes the real secret.
          terraform apply -input=false -auto-approve -target=aws_ecr_repository.app \
            -var "image_tag=$(git rev-parse --short HEAD)" \
            -var 'app_secrets={}'

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          TAG="$(git rev-parse --short HEAD)"
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$TAG"
          # Build context = repo root (workspace dependency @dodao/web-core).
          # NEXT_PUBLIC_VERCEL_URL is a bare host — shared getBaseUrl() prepends https:// (plan §5.6).
          docker build \
            -f insights-ui/deploy/aws/Dockerfile \
            --build-arg NEXT_PUBLIC_VERCEL_URL="koalagains.com" \
            --build-arg NEXT_PUBLIC_VERCEL_ENV="production" \
            -t "$IMAGE" .
          docker push "$IMAGE"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Optional: upload this build's static assets to S3 WITHOUT deleting prior builds (skew
      # safety, plan §10). Hashed filenames never collide, so old chunks stay fetchable for
      # CloudFront-cached HTML from previous builds. No-op if the bucket isn't in use.
      - name: Extract & upload static assets to S3
        continue-on-error: true
        env:
          TAG: ${{ steps.build.outputs.tag }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          CID=$(docker create "$REGISTRY/$ECR_REPOSITORY:$TAG")
          rm -rf ./_assets && mkdir -p ./_assets
          docker cp "$CID:/app/insights-ui/.next/static" ./_assets/static
          docker cp "$CID:/app/insights-ui/public" ./_assets/public
          docker rm "$CID"
          aws s3 sync ./_assets/static "s3://$STATIC_BUCKET/_next/static" --cache-control "public,max-age=31536000,immutable"
          aws s3 sync ./_assets/public "s3://$STATIC_BUCKET/public"

      # Deploy = terraform apply, which registers a new Lightsail deployment version pointing at
      # the new image and injects secrets (read here from Secrets Manager) into its environment.
      # DATABASE_URL inside the secret points at the existing RDS instance.
      - name: Terraform apply (Lightsail)
        working-directory: ${{ env.TF_DIR }}
        env:
          TAG: ${{ steps.build.outputs.tag }}
        run: |
          SECRETS_JSON=$(aws secretsmanager get-secret-value --secret-id "$APP_SECRETS_ID" --query SecretString --output text)
          terraform apply -input=false -auto-approve \
            -var "image_tag=$TAG" \
            -var "app_secrets=$SECRETS_JSON"

      - name: Smoke check
        run: curl -fsS https://koalagains.com/api/health
