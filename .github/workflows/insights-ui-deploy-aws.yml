name: Deploy insights-ui (AWS / Lightsail)

# Builds the insights-ui container, pushes it to ECR, uploads static assets to S3, and rolls
# the Lightsail container service to the new image via `terraform apply` against
# deployments/insights-ui. See docs/insights-ui/aws-migration-plan.md.
#
# Phase A: the app is reachable directly at https://prod.koalagains.com (no CloudFront), running
# in parallel with Vercel. This deploys to AWS only — Vercel keeps deploying via its own flow
# until cut-over.
#
# Auto-deploys on merge to `main` whenever the insights-ui app or the shared web-core package
# changes (web-core is a build dependency of insights-ui). Also runnable manually.

on:
  push:
    branches: [main]
    paths:
      - 'insights-ui/**'
      - 'shared/web-core/**'
      - 'deployments/insights-ui/**'
      - '.github/workflows/insights-ui-deploy-aws.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        type: choice
        default: production
        options: [production]

permissions:
  contents: read

concurrency:
  group: insights-ui-aws-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: insights-ui
  STATIC_BUCKET: insights-ui-static-assets
  TF_DIR: deployments/insights-ui
  APP_SECRETS_ID: insights-ui/app-env # Secrets Manager JSON consumed as the app_secrets map
  DIRECT_HOST: prod.koalagains.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ECR repos + S3 bucket are Terraform resources — create them first so `docker push`, the
      # BuildKit registry cache, and the static upload have targets. app_secrets defaults to {}
      # so the targeted apply runs.
      - name: Terraform init + ensure ECR repos and S3 bucket
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -target=aws_ecr_repository.app -target=aws_ecr_repository.buildcache \
            -target=aws_s3_bucket.assets \
            -var "image_tag=$(git rev-parse --short HEAD)"

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Required for `--cache-to/--cache-from type=registry`: the default docker driver cannot
      # export a registry cache, only the docker-container driver buildx sets up here.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          # `next build` prerenders "/" which reads top industries from the DB, so the build
          # needs DATABASE_URL. Sourced from the GitHub repo secret (the Secrets Manager
          # app-env JSON is not guaranteed to hold it). Passed to docker as a BuildKit
          # secret (not a build-arg) so it is never baked into image layers.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TAG="$(git rev-parse --short HEAD)"
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$TAG"
          # Rewritten every run, so it lives in the MUTABLE -buildcache repo (the app repo is
          # IMMUTABLE and would reject the second push). See container.tf.
          CACHE="$REGISTRY/$ECR_REPOSITORY-buildcache:cache"
          # Load /_next/static/* through CloudFront (edge-cached + gzip/brotli) rather than the raw
          # S3 URL (uncompressed, no CDN). koalagains.com is the CloudFront alias and routes
          # /_next/static/* to the S3 asset origin (see deployments/insights-ui/cloudfront.tf).
          # NOT DIRECT_HOST — that hits the Lightsail origin directly and bypasses CloudFront.
          ASSET_PREFIX="https://koalagains.com"
          # Build context = repo root (workspace dependency @dodao/web-core).
          # Phase A: base URL is the direct host; static assets are served from S3 via CloudFront.
          #
          # `--load` (not `--push`) puts the image in the local daemon so the next step's
          # `docker create` can extract static assets without re-pulling ~1GB from ECR; the
          # explicit `docker push` then ships it. `image-manifest/oci-mediatypes` are REQUIRED
          # for a registry cache on ECR — it rejects BuildKit's default cache manifest type.
          # A cold cache (first run, or after the 7-day expiry) just builds everything, as before.
          docker buildx build \
            -f deployments/insights-ui/Dockerfile \
            --build-arg NEXT_PUBLIC_VERCEL_URL="$DIRECT_HOST" \
            --build-arg NEXT_PUBLIC_VERCEL_ENV="production" \
            --build-arg NEXT_PUBLIC_ASSET_PREFIX="$ASSET_PREFIX" \
            --secret id=database_url,env=DATABASE_URL \
            --cache-from "type=registry,ref=$CACHE" \
            --cache-to "type=registry,ref=$CACHE,mode=max,image-manifest=true,oci-mediatypes=true" \
            --load \
            -t "$IMAGE" .
          docker push "$IMAGE"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Upload this build's static assets to S3 WITHOUT deleting prior builds (skew safety).
      # Hashed filenames never collide → CloudFront/browser-cached HTML from older builds keeps
      # resolving its chunks. Extracted from the freshly built image.
      - name: Extract & upload static assets to S3
        env:
          TAG: ${{ steps.build.outputs.tag }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          CID=$(docker create "$REGISTRY/$ECR_REPOSITORY:$TAG")
          rm -rf ./_assets && mkdir -p ./_assets
          docker cp "$CID:/app/insights-ui/.next/static" ./_assets/static
          docker cp "$CID:/app/insights-ui/public" ./_assets/public
          docker rm "$CID"
          # Only /_next/static is served from S3 (via assetPrefix). /public is served by the
          # Next server at the site root, so it is NOT uploaded here.
          aws s3 sync ./_assets/static "s3://$STATIC_BUCKET/_next/static" --cache-control "public,max-age=31536000,immutable"

      # Full apply registers a new Lightsail deployment version pointing at the new image and
      # injects secrets (from Secrets Manager) into its env. DATABASE_URL inside the secret
      # points at the existing public RDS.
      #
      # Secrets are written to a *.auto.tfvars.json file (NOT passed inline via -var): a JSON
      # object does not parse into a map(string) through `-var`, and an inline -var would also
      # leak the secret into the process table / unmasked logs. Terraform auto-loads *.auto.tfvars.json.
      - name: Terraform apply (Lightsail)
        working-directory: ${{ env.TF_DIR }}
        env:
          TAG: ${{ steps.build.outputs.tag }}
        run: |
          SECRETS_JSON=$(aws secretsmanager get-secret-value --secret-id "$APP_SECRETS_ID" --query SecretString --output text)
          jq -n --argjson s "$SECRETS_JSON" --arg tag "$TAG" '{app_secrets: $s, image_tag: $tag}' > secrets.auto.tfvars.json
          # First apply can fail while the Lightsail cert is still PENDING_VALIDATION — retry once
          # after a wait for DNS validation to propagate.
          terraform apply -input=false -auto-approve \
            || (echo "retrying after cert validation wait..."; sleep 120; terraform apply -input=false -auto-approve)
          rm -f secrets.auto.tfvars.json

      # Wait for the new deployment version to roll to ACTIVE before smoke-testing, otherwise we
      # hit the old version (or a still-deploying container).
      #
      # Poll the DEPLOYMENT, not the container service: a service's state is RUNNING/UPDATING/…
      # and is NEVER "ACTIVE" (that is a deployment state), so the previous check here could not
      # match and always burned its full timeout (~10 min) on every deploy before falling
      # through WITHOUT failing. Combined with a smoke check that the OLD version answers just
      # as happily, a failed rollout reported success. We now assert the ACTIVE deployment is
      # running the image tag this run built, and fail on FAILED or on timeout.
      - name: Wait for Lightsail deployment to be ACTIVE
        env:
          TAG: ${{ steps.build.outputs.tag }}
        run: |
          for i in $(seq 1 60); do
            read -r state image <<<"$(aws lightsail get-container-service-deployments \
              --service-name "$ECR_REPOSITORY" \
              --query 'deployments[0].[state,containers.app.image]' --output text)"
            echo "deployment: state=$state image=$image"
            case "$state" in
              ACTIVE)
                case "$image" in
                  *":$TAG") echo "Deployment ACTIVE on $TAG."; exit 0 ;;
                  *) echo "ACTIVE but still the previous image; waiting for $TAG..." ;;
                esac
                ;;
              FAILED)
                echo "::error::Lightsail deployment FAILED for $TAG"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::Timed out waiting for Lightsail deployment $TAG to become ACTIVE"
          exit 1

      # Belt-and-braces: the wait above already proves the new version is serving, but this
      # catches an app that rolls out ACTIVE yet 500s on a real request through the public host.
      - name: Smoke check (direct host)
        run: |
          for i in $(seq 1 10); do
            curl -fsS "https://$DIRECT_HOST/api/health" && exit 0
            echo "health not ready, retrying..."; sleep 15
          done
          echo "::error::Smoke check failed against https://$DIRECT_HOST/api/health"
          exit 1
