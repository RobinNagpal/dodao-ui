name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "tasks/**"
      - "ai-agents/**"
      - "lambdas/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "tasks/**"

jobs:
  determine-changed-paths:
    runs-on: ubuntu-latest
    outputs:
      shared_web_core_changed: ${{ steps.filter.outputs.shared_web_core }}
      academy_ui_changed: ${{ steps.filter.outputs.academy_ui }}
      base_ui_changed: ${{ steps.filter.outputs.base_ui }}
      defi_alerts_changed: ${{ steps.filter.outputs.defi_alerts }}
      insights_ui_changed: ${{ steps.filter.outputs.insights_ui }}
      news_reader_changed: ${{ steps.filter.outputs.news_reader }}
      simulations_changed: ${{ steps.filter.outputs.simulations }}
    steps:
      - uses: actions/checkout@v2
      - name: Determine changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            shared_web_core:
              - 'shared/web-core/**'
            academy_ui:
              - 'academy-ui/**'
            base_ui:
              - 'base-ui/**'
            defi_alerts:
              - 'defi-alerts/**'
            insights_ui:
              - 'insights-ui/**'
            news_reader:
              - 'news-reader/**'
            simulations:
              - 'simulations/**'

  academy_ui_job:
    runs-on: ubuntu-latest
    needs: determine-changed-paths
    if: ${{ needs.determine-changed-paths.outputs.academy_ui_changed == 'true' || needs.determine-changed-paths.outputs.shared_web_core_changed == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 23.11.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Shared Web Core - Install dependencies
        run: cd shared/web-core && pnpm install --filter @dodao/web-core

      - name: Shared Web Core - TSC
        run: cd shared/web-core && pnpm tsc

      - name: Shared Web Core - Run Prettier
        run: cd shared/web-core && pnpm prettier-check

      - name: Academy - Install dependencies
        run: cd academy-ui && pnpm install --filter academy-ui

      - name: Academy - Run ESLint
        run: cd academy-ui && pnpm lint

      - name: Academy - Run Prettier
        run: cd academy-ui && pnpm prettier-check

      - name: Academy - TSC (includes web-core)
        run: cd academy-ui && pnpm compile

      - name: Academy - NEXT Build
        run: cd academy-ui && pnpm build

  base_ui_job:
    runs-on: ubuntu-latest
    needs: determine-changed-paths
    if: ${{ needs.determine-changed-paths.outputs.base_ui_changed == 'true' || needs.determine-changed-paths.outputs.shared_web_core_changed == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 23.11.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Shared Web Core - Install dependencies
        run: cd shared/web-core && pnpm install --filter @dodao/web-core

      - name: Shared Web Core - TSC
        run: cd shared/web-core && pnpm tsc

      - name: Shared Web Core - Run Prettier
        run: cd shared/web-core && pnpm prettier-check

      - name: Base UI - Install dependencies
        run: cd base-ui && pnpm install --filter base-ui

      - name: Base UI - Run ESLint
        run: cd base-ui && pnpm lint

      - name: Base UI - Run Prettier
        run: cd base-ui && pnpm prettier-check

      - name: Base UI - TSC
        run: cd base-ui && pnpm compile

      - name: Base UI - NEXT Build
        run: cd base-ui && pnpm build

  defi_alerts_job:
    runs-on: ubuntu-latest
    needs: determine-changed-paths
    if: ${{ needs.determine-changed-paths.outputs.defi_alerts_changed == 'true' || needs.determine-changed-paths.outputs.shared_web_core_changed == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 23.11.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Shared Web Core - Install dependencies
        run: cd shared/web-core && pnpm install --filter @dodao/web-core

      - name: Shared Web Core - TSC
        run: cd shared/web-core && pnpm tsc

      - name: Shared Web Core - Run Prettier
        run: cd shared/web-core && pnpm prettier-check

      - name: DeFi Alerts - Install dependencies
        run: cd defi-alerts && pnpm install --filter defi-alerts

      - name: DeFi Alerts - Run ESLint
        run: cd defi-alerts && pnpm lint

      - name: DeFi Alerts - Run Prettier
        run: cd defi-alerts && pnpm prettier-check

      - name: DeFi Alerts - TSC
        run: cd defi-alerts && pnpm compile

      - name: DeFi Alerts - Build
        run: cd defi-alerts && pnpm build

  insights_ui_job:
    runs-on: ubuntu-latest
    needs: determine-changed-paths
    if: ${{ needs.determine-changed-paths.outputs.insights_ui_changed == 'true' || needs.determine-changed-paths.outputs.shared_web_core_changed == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 23.11.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Set environment variables
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> $GITHUB_ENV
          echo "KOALA_AWS_SECRET_ACCESS_KEY=${{ secrets.KOALA_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "KOALA_AWS_ACCESS_KEY_ID=${{ secrets.KOALA_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> $GITHUB_ENV
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> $GITHUB_ENV

      - name: Shared Web Core - Install dependencies
        run: cd shared/web-core && pnpm install --filter @dodao/web-core

      - name: Shared Web Core - TSC
        run: cd shared/web-core && pnpm tsc

      - name: Shared Web Core - Run Prettier
        run: cd shared/web-core && pnpm prettier-check

      - name: Insights UI - Install dependencies
        run: cd insights-ui && pnpm install --filter insights-ui

      - name: Insights UI - Check migrations don't require prod data loss
        # Connects READ-ONLY to the real production database and asks Prisma
        # to compute the SQL diff between prod's current schema and the PR's
        # `prisma/schema.prisma`. We scan that diff for the specific
        # operations that would make `prisma migrate dev` prompt
        # "should I delete the data?" — adding NOT NULL without DEFAULT,
        # DROP COLUMN, DROP TABLE, SET NOT NULL on an existing column,
        # and similar destructive changes.
        #
        # `prisma migrate diff` never applies anything to the target DB;
        # it only reads information_schema (equivalent to `\d` in psql)
        # to build the diff. If the PROD_DATABASE_URL secret isn't
        # configured yet, the step logs a warning and exits 0 so CI
        # doesn't fail until the secret is wired up.
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          set -e
          if [ -z "${PROD_DATABASE_URL:-}" ]; then
            echo "::warning::PROD_DATABASE_URL secret is not configured — skipping prod migration safety check. Add the secret in repo Settings → Secrets → Actions to enable."
            exit 0
          fi

          cd insights-ui

          diff_file=/tmp/prisma-migration-diff.sql
          pnpm exec prisma migrate diff \
            --from-url "$PROD_DATABASE_URL" \
            --to-schema-datamodel ./prisma/schema.prisma \
            --script > "$diff_file"

          if [ ! -s "$diff_file" ]; then
            echo "No schema diff between prod and the PR's schema.prisma — nothing to check."
            exit 0
          fi

          echo "===== SQL Prisma would need to run to bring prod up to PR schema ====="
          cat "$diff_file"
          echo "====================================================================="

          destructive=0
          fail() { echo "::error::$1"; destructive=1; }

          # 1) DROP TABLE / DROP COLUMN → definite data loss (`migrate dev` prompts).
          if grep -qiE '(^|[[:space:]])DROP[[:space:]]+TABLE([[:space:]]|$)' "$diff_file"; then
            fail "Migration would DROP a table (data loss):"
            grep -niE '(^|[[:space:]])DROP[[:space:]]+TABLE([[:space:]]|$)' "$diff_file"
          fi
          if grep -qiE 'DROP[[:space:]]+COLUMN' "$diff_file"; then
            fail "Migration would DROP a column (data loss):"
            grep -niE 'DROP[[:space:]]+COLUMN' "$diff_file"
          fi

          # 2) ALTER COLUMN ... SET NOT NULL on an existing column fails if any
          #    row has NULL in that column — `migrate dev` prompts.
          if grep -qiE 'ALTER[[:space:]]+COLUMN[^;]*SET[[:space:]]+NOT[[:space:]]+NULL' "$diff_file"; then
            fail "Migration promotes an existing column to NOT NULL (fails if any row is NULL):"
            grep -niE 'ALTER[[:space:]]+COLUMN[^;]*SET[[:space:]]+NOT[[:space:]]+NULL' "$diff_file"
          fi

          # 3) ADD COLUMN ... NOT NULL without DEFAULT fails on populated tables;
          #    `migrate dev` prompts. Inspect each matching statement line-by-line.
          while IFS= read -r stmt; do
            if echo "$stmt" | grep -qiE 'ADD[[:space:]]+COLUMN' \
               && echo "$stmt" | grep -qiE 'NOT[[:space:]]+NULL' \
               && ! echo "$stmt" | grep -qiE 'DEFAULT'; then
              fail "Migration adds a NOT NULL column without a DEFAULT (fails on populated table):"
              echo "  $stmt"
            fi
          done < "$diff_file"

          # 4) ALTER COLUMN ... TYPE — may narrow / truncate data. Warn only.
          if grep -qiE 'ALTER[[:space:]]+COLUMN[^;]*[[:space:]]TYPE[[:space:]]' "$diff_file"; then
            echo "::warning::Migration changes a column TYPE — verify it doesn't narrow / truncate existing data:"
            grep -niE 'ALTER[[:space:]]+COLUMN[^;]*[[:space:]]TYPE[[:space:]]' "$diff_file"
          fi

          if [ "$destructive" -eq 1 ]; then
            echo ""
            echo "::error::This PR contains migrations that would make \`prisma migrate dev\` prompt for data deletion on the real prod DB. Make the migration additive / backwards-compatible (add DEFAULT, keep the column nullable, backfill first) before merging."
            exit 1
          fi

          echo "✓ No data-loss-inducing operations detected — migration is safe to apply to prod."

      - name: Insights UI - Run ESLint
        run: cd insights-ui && pnpm lint

      - name: Insights UI - Run Prettier
        run: cd insights-ui && pnpm prettier-check

      - name: Insights UI - TSC
        run: cd insights-ui && pnpm compile

      - name: Insights UI - NEXT Build
        run: cd insights-ui && pnpm build

  news_reader_job:
    runs-on: ubuntu-latest
    needs: determine-changed-paths
    if: ${{ needs.determine-changed-paths.outputs.news_reader_changed == 'true' || needs.determine-changed-paths.outputs.shared_web_core_changed == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 23.11.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Shared Web Core - Install dependencies
        run: cd shared/web-core && pnpm install --filter @dodao/web-core

      - name: Shared Web Core - TSC
        run: cd shared/web-core && pnpm tsc

      - name: Shared Web Core - Run Prettier
        run: cd shared/web-core && pnpm prettier-check

      - name: News Reader - Install dependencies
        run: cd news-reader && pnpm install --filter news-reader

      - name: News Reader - Run ESLint
        run: cd news-reader && pnpm lint

      - name: News Reader - Run Prettier
        run: cd news-reader && pnpm prettier-check

      - name: News Reader - TSC
        run: cd news-reader && pnpm compile

      - name: News Reader - NEXT Build
        run: cd news-reader && pnpm build

  simulations_job:
    runs-on: ubuntu-latest
    needs: determine-changed-paths
    if: ${{ needs.determine-changed-paths.outputs.simulations_changed == 'true' || needs.determine-changed-paths.outputs.shared_web_core_changed == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 23.11.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Shared Web Core - Install dependencies
        run: cd shared/web-core && pnpm install --filter @dodao/web-core

      - name: Shared Web Core - TSC
        run: cd shared/web-core && pnpm tsc

      - name: Shared Web Core - Run Prettier
        run: cd shared/web-core && pnpm prettier-check

      - name: Simulations - Install dependencies
        run: cd simulations && pnpm install --filter simulations

      - name: Simulations - Run ESLint
        run: cd simulations && pnpm lint

      - name: Simulations - Run Prettier
        run: cd simulations && pnpm prettier-check

      - name: Simulations - TSC
        run: cd simulations && pnpm compile

      - name: Simulations - Build
        run: cd simulations && pnpm build
