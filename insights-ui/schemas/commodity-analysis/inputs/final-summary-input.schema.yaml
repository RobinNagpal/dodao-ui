$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: true
properties:
  name:
    type: string
  slug:
    type: string
  commodityGroup:
    type: string
  unit:
    type: ['string', 'null']
  currency:
    type: string
  categorySummaries:
    type: array
    items:
      type: object
      properties:
        categoryName:
          type: string
        summary:
          type: string
        score:
          type: number
        total:
          type: number
      required:
        - categoryName
        - summary
required:
  - name
  - commodityGroup
  - categorySummaries
