$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: true
properties:
  name:
    type: string
  slug:
    type: string
  commodityGroup:
    type: string
  priceSymbol:
    type: ['string', 'null']
  exchange:
    type: ['string', 'null']
  unit:
    type: ['string', 'null']
  currency:
    type: string
  categoryName:
    type: string
  categoryDescription:
    type: string
  factors:
    type: array
    items:
      type: object
      properties:
        factorKey:
          type: string
        factorTitle:
          type: string
        factorDescription:
          type: string
        factorMetrics:
          type: ['string', 'null']
      required:
        - factorKey
        - factorTitle
        - factorDescription
required:
  - name
  - commodityGroup
  - categoryName
  - factors
