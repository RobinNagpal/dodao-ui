$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: false
properties:
  keyFacts:
    type: string
    description: 'Exactly TWO plain-prose paragraphs (separated by a blank line) describing what this commodity is, how it is priced/traded, and what a retail investor most needs to know.'
  greenFlags:
    type: array
    description: '2-4 positive, non-obvious signals for this commodity right now.'
    items:
      type: object
      properties:
        flag:
          type: string
          description: '4-8 word plain-English headline.'
        explanation:
          type: string
          description: 'About two sentences explaining the signal.'
        result:
          type: string
          enum: ['Pass', 'Fail']
          description: 'Pass when the signal is currently present for this commodity, else Fail.'
      required:
        - flag
        - explanation
        - result
  redFlags:
    type: array
    description: '2-4 genuine risks/negatives for this commodity right now.'
    items:
      type: object
      properties:
        flag:
          type: string
        explanation:
          type: string
        result:
          type: string
          enum: ['Pass', 'Fail']
      required:
        - flag
        - explanation
        - result
  mainUses:
    type: array
    description: 'Main real-world uses of the commodity.'
    items:
      type: string
  topProducers:
    type: array
    description: 'Largest producing countries.'
    items:
      type: object
      properties:
        country:
          type: string
        share:
          type: string
          description: 'Approximate share of global production, e.g. "~13%". Optional.'
      required:
        - country
  waysToInvest:
    type: array
    description: 'Main ways a retail investor gets exposure.'
    items:
      type: object
      properties:
        type:
          type: string
          description: 'e.g. ETF, Futures, Physical, Equities.'
        name:
          type: string
          description: 'A representative instrument, e.g. an ETF ticker.'
        note:
          type: string
          description: 'Optional short note.'
      required:
        - type
        - name
required:
  - keyFacts
  - greenFlags
  - redFlags
  - mainUses
  - topProducers
  - waysToInvest
