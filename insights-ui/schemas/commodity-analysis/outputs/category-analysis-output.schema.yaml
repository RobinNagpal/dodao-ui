$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: false
properties:
  overallSummary:
    type: string
    description: '3–5 sentence takeaway on how this commodity looks for the category being analyzed, written for a retail investor. Highlight the most important strengths and weaknesses and end with a clear stance (positive, negative, or mixed).'
  overallAnalysisDetails:
    type: string
    description: 'In 3-4 markdown paragraphs, discuss the category in detail for this specific commodity.'
  factors:
    type: array
    description: 'Array of factor-level analyses. One entry per input factor.'
    items:
      type: object
      properties:
        factorKey:
          type: string
          description: 'Must match the factorKey from the input factors array.'
        oneLineExplanation:
          type: string
          description: '1–2 sentence quick takeaway for this factor.'
        detailedExplanation:
          type: string
          description: '1–2 paragraphs of investor-focused analysis for this factor. Must justify the Pass/Fail result and be honest about risks.'
        result:
          type: string
          enum: ['Pass', 'Fail']
          description: 'The final judgment for this factor. Be conservative; a Fail must be justified in the detailedExplanation.'
      required:
        - factorKey
        - oneLineExplanation
        - detailedExplanation
        - result
required:
  - overallSummary
  - overallAnalysisDetails
  - factors
