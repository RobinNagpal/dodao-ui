$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: false
properties:
  keyFacts:
    type: string
    description: 'Exactly TWO plain-prose paragraphs (separated by a blank line) covering the most important things a retail investor should know about this ETF — what it is and how it is run, and how it differs from close peers. No headings, no bullets, no markdown. This is the "important things to know" block shown above the charts.'
  greenFlags:
    type: array
    description: 'One assessment per green flag provided in the input `greenFlags`. Judge whether THIS ETF exhibits each green flag. Return them in the same order as the input.'
    items:
      type: object
      additionalProperties: false
      properties:
        flag:
          type: string
          description: 'The green-flag text being assessed, copied from the input greenFlags entry.'
        explanation:
          type: string
          description: 'About two sentences (roughly two lines): the key takeaway on whether this ETF shows this green flag plus the specific evidence/reasoning, with a numeric anchor where one exists.'
        result:
          type: string
          enum: ['Pass', 'Fail']
          description: 'Pass when this ETF genuinely exhibits the green flag; Fail when it does not. If it cannot be confidently sourced, Fail and say so in the explanation.'
      required:
        - flag
        - explanation
        - result
  redFlags:
    type: array
    description: 'One assessment per red flag provided in the input `redFlags`. Judge whether THIS ETF trips each red flag. Return them in the same order as the input.'
    items:
      type: object
      additionalProperties: false
      properties:
        flag:
          type: string
          description: 'The red-flag text being assessed, copied from the input redFlags entry.'
        explanation:
          type: string
          description: 'About two sentences (roughly two lines): the key takeaway on whether this ETF trips this red flag plus the specific evidence/reasoning, with a numeric anchor where one exists.'
        result:
          type: string
          enum: ['Pass', 'Fail']
          description: 'Pass when this ETF AVOIDS the red flag (the good outcome); Fail when the ETF actually trips the red flag.'
      required:
        - flag
        - explanation
        - result
  similarEtfs:
    type: array
    minItems: 6
    description: 'At least 6 ETFs that are genuine substitutes for the analyzed ETF — same/very-similar underlying index, same category, same broad exposure mechanics. Not just famous or popular peers. All entries must be US-listed on BATS, NASDAQ, NYSE, or NYSEARCA.'
    items:
      type: object
      additionalProperties: false
      properties:
        symbol:
          type: string
          description: 'Ticker symbol of the similar ETF in uppercase (e.g., VOO, IVV).'
        exchange:
          type: string
          enum: ['BATS', 'NASDAQ', 'NYSE', 'NYSEARCA']
          description: 'Exchange code in uppercase. Must be one of: BATS, NASDAQ, NYSE, NYSEARCA.'
      required:
        - symbol
        - exchange
  applicableInvestorGoals:
    type: array
    description: >-
      The investor goals THIS ETF can genuinely help achieve, grouped by investor type. Add one entry per applicable
      investor type, each listing the goal keys (chosen from that type's goals in the input `investorTypes`) the fund
      satisfies. Use the exact key strings from the input — never invent keys or return display names. Include an
      investor type only when the fund truly serves at least one of its goals. Judge fit strictly against the fund's
      mandate, cost, structure, liquidity, and risk: a solid, well-run fund typically satisfies 2+ goals, and a broad,
      low-cost core fund (e.g., an S&P 500 tracker) may legitimately span 4-8 goals across several investor types.
      Return an empty array ONLY for a fundamentally flawed, broken, or so-narrow fund that serves no goal well.
    items:
      type: object
      additionalProperties: false
      properties:
        investorTypeKey:
          type: string
          enum:
            - retail-individual
            - high-net-worth-individual
            - pension-endowment-foundation-sovereign
            - insurance-bank-corporate-treasury
            - financial-advisor-ria
            - hedge-fund-asset-manager-trading-desk
          description: 'The investor-type key this group of goals belongs to.'
        goalKeys:
          type: array
          minItems: 1
          description: 'Keys of the goals (under this investor type, from the input) this ETF can help achieve. No duplicates.'
          items:
            type: string
      required:
        - investorTypeKey
        - goalKeys
  expectedNext1YrReturns:
    type: number
    description: 'Expected ANNUALIZED total return (price appreciation plus reinvested distributions, net of fees) over the next 1 year, as a plain percent number (e.g. 7.5 means 7.5%/yr, -2 means -2%/yr). Ground it in the fund''s asset class, current yield/valuation, and expense ratio; be conservative given the short horizon. This field is required — always provide a numeric best estimate (fall back to the long-run expected return for the fund''s asset class/category when fund-specific data is sparse).'
  expectedNext1YrReturnsReason:
    type: string
    description: 'About three lines (2-3 sentences) explaining the main drivers behind expectedNext1YrReturns for THIS fund — e.g. valuation/yield starting point, expense drag, historical CAGR, sector concentration, and the category/macro outlook. Cite concrete figures where relevant; not generic.'
  expectedNext3YrReturns:
    type: number
    description: 'Expected ANNUALIZED total return over the next 3 years, as a plain percent number (e.g. 7.5 means 7.5%/yr). Same grounding as expectedNext1YrReturns. This field is required — always provide a numeric best estimate.'
  expectedNext3YrReturnsReason:
    type: string
    description: 'About three lines (2-3 sentences) explaining the main drivers behind expectedNext3YrReturns for THIS fund. Cite concrete figures where relevant; not generic.'
  expectedNext5YrReturns:
    type: number
    description: 'Expected ANNUALIZED total return over the next 5 years, as a plain percent number (e.g. 7.5 means 7.5%/yr). Same grounding as expectedNext1YrReturns. This field is required — always provide a numeric best estimate.'
  expectedNext5YrReturnsReason:
    type: string
    description: 'About three lines (2-3 sentences) explaining the main drivers behind expectedNext5YrReturns for THIS fund. Cite concrete figures where relevant; not generic.'
required:
  - keyFacts
  - greenFlags
  - redFlags
  - similarEtfs
  - applicableInvestorGoals
  - expectedNext1YrReturns
  - expectedNext1YrReturnsReason
  - expectedNext3YrReturns
  - expectedNext3YrReturnsReason
  - expectedNext5YrReturns
  - expectedNext5YrReturnsReason
