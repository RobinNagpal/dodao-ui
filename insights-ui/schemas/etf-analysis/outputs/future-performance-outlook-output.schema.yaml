$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: false
properties:
  overallSummary:
    type: string
    description: '3–5 sentence final summary of how the ETF performs in this category. Must highlight the most important strengths and weaknesses, and conclude with a clear investor takeaway (positive, negative, or mixed). Keep language simple and concise for retail investors.'
  overallAnalysisDetails:
    type: string
    description: 'In 3-4 paragraphs discuss in detail about the category being analyzed. Explain the most important things that are needed to understand that particular ETF for that category.'
  factors:
    type: array
    description: 'Array of factor-level analyses.'
    items:
      type: object
      properties:
        factorAnalysisKey:
          type: string
          description: 'Must match the key from the input factorAnalysisArray.'
        oneLineExplanation:
          type: string
          description: '1–2 sentence quick takeaway that gives the key insight from this factor.'
        detailedExplanation:
          type: string
          description: '1–2 paragraphs of investor-focused analysis for this factor. Directly analyze the ETF based on this factor using available data and reasoning. The explanation must clearly justify the Pass/Fail result, be critical in tone, and highlight risks or weaknesses along with strengths.'
        result:
          type: string
          enum: ['Pass', 'Fail']
          description: 'The final judgment for this factor. Be conservative — only ETFs with strong metrics should get "Pass". A "Fail" should come with clear reasoning in the detailedExplanation.'
      required:
        - factorAnalysisKey
        - oneLineExplanation
        - detailedExplanation
        - result
  expectedNext1YrReturns:
    type: number
    description: 'Expected ANNUALIZED total return (price appreciation plus reinvested distributions, net of fees) over the next 1 year, as a plain percent number (e.g. 7.5 means 7.5%/yr, -2 means -2%/yr). Ground it in the fund''s asset class, historical returns/CAGR, current yield/valuation, and expense ratio; be conservative given the short horizon. This field is required — always provide a numeric best estimate (fall back to the long-run expected return for the fund''s asset class/category when fund-specific data is sparse).'
  expectedNext1YrReturnsReason:
    type: string
    description: 'About three lines (2-3 sentences) explaining the main drivers behind expectedNext1YrReturns for THIS fund — e.g. valuation/yield starting point, expense drag, historical CAGR, sector concentration, and the category/macro outlook. Cite concrete figures where relevant; not generic.'
  expectedNext3YrReturns:
    type: number
    description: 'Expected ANNUALIZED total return over the next 3 years, as a plain percent number (e.g. 7.5 means 7.5%/yr). Same grounding as expectedNext1YrReturns. This field is required — always provide a numeric best estimate.'
  expectedNext3YrReturnsReason:
    type: string
    description: 'About three lines (2-3 sentences) explaining the main drivers behind expectedNext3YrReturns for THIS fund. Cite concrete figures where relevant; not generic.'
  expectedNext5YrReturns:
    type: number
    description: 'Expected ANNUALIZED total return over the next 5 years, as a plain percent number (e.g. 7.5 means 7.5%/yr). Same grounding as expectedNext1YrReturns. This field is required — always provide a numeric best estimate.'
  expectedNext5YrReturnsReason:
    type: string
    description: 'About three lines (2-3 sentences) explaining the main drivers behind expectedNext5YrReturns for THIS fund. Cite concrete figures where relevant; not generic.'
required:
  - overallSummary
  - overallAnalysisDetails
  - factors
  - expectedNext1YrReturns
  - expectedNext1YrReturnsReason
  - expectedNext3YrReturns
  - expectedNext3YrReturnsReason
  - expectedNext5YrReturns
  - expectedNext5YrReturnsReason
