$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: false
properties:
  name:
    type: string
    description: 'The full name of the ETF (e.g., SPDR S&P 500 ETF Trust).'
  symbol:
    type: string
    description: 'Ticker symbol of the ETF in uppercase (e.g., SPY, VOO).'
  exchange:
    type: string
    description: 'Exchange code (e.g., NYSEARCA, NASDAQ).'
  assetClass:
    type: ['string', 'null']
    description: 'The ETF asset class (e.g., Equity, Fixed Income).'
  issuer:
    type: ['string', 'null']
    description: 'ETF issuer/provider (e.g., Vanguard, iShares, SPDR).'
  category:
    type: ['string', 'null']
    description: 'ETF category as provided by the data source (e.g., Large Blend).'
  indexName:
    type: ['string', 'null']
    description: 'Index name the ETF aims to track (if known).'
  mostImportant:
    type: array
    description: 'Qualitative facts about this KIND of fund (from the category) to guide the two "important things to know" paragraphs. May be empty when the category has no entry.'
    items:
      type: string
  greenFlags:
    type: array
    description: 'Category-defined green flags (signs of a strong fund) to assess one-by-one against this ETF. May be empty.'
    items:
      type: string
  redFlags:
    type: array
    description: 'Category-defined red flags (signs of a weak/risky fund) to assess one-by-one against this ETF. May be empty.'
    items:
      type: string
  investorTypes:
    type: array
    description: 'The canonical investor-type taxonomy with the goals each type pursues with ETFs. Use it to pick, per investor type, the goals THIS ETF can genuinely help achieve (the applicableInvestorGoals output).'
    items:
      type: object
      additionalProperties: false
      properties:
        key:
          type: string
          description: 'Investor-type key (e.g., retail-individual).'
        name:
          type: string
          description: 'Human-readable investor-type name.'
        goals:
          type: array
          description: 'Goals this investor type pursues with ETFs.'
          items:
            type: object
            additionalProperties: false
            properties:
              key:
                type: string
                description: 'Goal key to return in applicableInvestorGoals.goalKeys.'
              name:
                type: string
                description: 'Human-readable goal name.'
              profile:
                type: object
                additionalProperties: false
                description: 'The investor profile this goal targets — use it to judge whether the ETF fits.'
                properties:
                  investmentHorizon:
                    type: string
                  riskTolerance:
                    type: string
                  primaryGoal:
                    type: string
                  incomeNeed:
                    type: string
                  taxSensitivity:
                    type: string
                  typicalInvestor:
                    type: string
                required:
                  - investmentHorizon
                  - riskTolerance
                  - primaryGoal
                  - incomeNeed
                  - taxSensitivity
                  - typicalInvestor
            required:
              - key
              - name
              - profile
      required:
        - key
        - name
        - goals
  currentPrice:
    type: ['string', 'null']
    description: 'The ETF''s current/last price as shown by the data source (e.g. "$123.45"). May be null.'
  historicalPerformance:
    type: array
    description: 'Trailing performance per window (the same returns/CAGR figures used to draw the price chart): total return over the window and the annualized/CAGR figure. Use as evidence for the expected forward returns. May be empty.'
    items:
      type: object
      additionalProperties: false
      properties:
        period:
          type: string
          description: 'The trailing window, e.g. "1M", "1Y", "5Y".'
        totalReturn:
          type: ['string', 'null']
          description: 'Total return over the window as shown by the source (e.g. "52.31%"). May be null.'
        annualizedReturn:
          type: ['string', 'null']
          description: 'Annualized return / CAGR over the window (e.g. "10.85%"). Null for sub-1-year windows or when unavailable.'
      required:
        - period
  sectorAllocation:
    type: array
    description: 'Equity sector weights of the fund vs its category average. Populated only for equity funds when available; empty otherwise.'
    items:
      type: object
      additionalProperties: false
      properties:
        sector:
          type: string
          description: 'Sector name (e.g. "Technology").'
        fundWeight:
          type: ['string', 'null']
          description: 'The fund''s weight in this sector as shown by the source (e.g. "28.4%"). May be null.'
        categoryWeight:
          type: ['string', 'null']
          description: 'The category average weight in this sector for comparison (e.g. "24.1%"). May be null.'
      required:
        - sector
required:
  - name
  - symbol
  - exchange
