$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: false

properties:
  name:
    type: string
    description: 'The full name of the ETF (e.g., SPDR S&P 500 ETF Trust).'
  symbol:
    type: string
    description: 'The ETF ticker symbol (e.g., SPY).'
  exchange:
    type: string
    description: 'Exchange code (e.g., NYSEARCA, NASDAQ).'

  categoryKey:
    type: string
    enum: ['FuturePerformanceOutlook']
    description: 'The analysis category being evaluated.'

  factorAnalysisArray:
    type: array
    description: 'Array of factors to analyze for this category.'
    items:
      type: object
      properties:
        factorAnalysisKey:
          type: string
          description: 'Unique identifier of the factor.'
        factorAnalysisTitle:
          type: string
          description: 'Readable title of the factor.'
        factorAnalysisDescription:
          type: string
          description: 'Short explanation of what this factor represents and why it matters.'
        factorAnalysisMetrics:
          type: string
          description: 'Comma-separated list of key metrics used for evaluating this factor.'
      required:
        - factorAnalysisKey
        - factorAnalysisTitle
        - factorAnalysisDescription

  # Asset class identifier — kept for analytical context and prompt framing
  assetClass:
    type: string
    description: 'The ETF asset class (e.g., Equity, Fixed Income, Alternatives, Commodity, Asset Allocation, Currency).'

  # Fund category — the Mor category string for this ETF (e.g., Large Blend, High Yield Bond).
  fundCategory:
    type: ['string', 'null']
    description: 'The Mor fund category (e.g., Large Blend, Technology, High Yield Bond). Provides peer-comparison context.'

  # ETF group — derived from fundCategory via etf-analysis-categories.json and drives which factors are selected.
  groupKey:
    type: string
    description: 'The ETF group key (e.g., broad-equity, sector-thematic-equity, fixed-income-investment-grade, derivative-income).'

  # Human-readable group name (matches EtfGroup.name in etf-analysis-categories.json) — useful for prompt phrasing.
  groupName:
    type: string
    description: 'Display name of the ETF group (e.g., "Broad Equity"). Mirrors groupKey but is shown to the LLM in plain English.'

  # All categories belonging to the same group, joined with ", ". Lets the LLM treat sibling categories as fair peers for comparison.
  groupCategories:
    type: string
    description: 'Comma-separated list of every Mor fund category that maps to this group. Some categories are very similar — the LLM should treat them as a valid peer set for category-level comparisons.'

  # Optional Mor-category-level instructions for this analysis category, sourced from
  # etf-analysis-categories.json → categories[].categoryInstructions[<analysisCategory>].
  # Renders alongside the per-factor group instructions to give the LLM a category-specific
  # lens (e.g. covered-call levers for "Derivative Income"). Null when the fund's category
  # has no override registered for this analysis category.
  categoryInstructions:
    type: ['string', 'null']
    description: 'Optional Mor-category-level prompt instructions for this analysis category (e.g., covered-call levers when the fund category is "Derivative Income"). Null when no override is registered.'

  # Benchmark index name — sourced from EtfStockAnalyzerInfo.indexName; may be null when the upstream data does not carry an index reference.
  indexName:
    type: ['string', 'null']
    description: 'The benchmark index this ETF tracks (e.g., "S&P 500", "MSCI EAFE"). May be null when not provided by upstream data.'

  # From EtfFinancialInfo — trimmed to forward-relevant fields: aum, pe, dividendYield,
  # payoutFrequency, payoutRatio, beta, holdings count. payoutFrequency + payoutRatio are
  # included for the forward_income_durability factor. Pure cost / intraday columns
  # (expenseRatio, sharesOut, volume, yearHigh, yearLow, dividendTtm) stay excluded.
  etfFinancialInfo:
    type: ['string', 'null']
    description: 'JSON string with aum, pe, dividendYield, payoutFrequency, payoutRatio, beta, holdings (count). Pure cost / intraday columns are excluded — those belong to Cost & Team.'

  # Full EtfStockAnalyzerInfo row passed through as-is. The forward outlook benefits from the
  # full multi-period view (returns 1m → 20y, CAGRs, full MA stack, RSI daily/weekly/monthly,
  # ATH/ATL + 52w distances, beta windows, risk-adjusted ratios, liquidity, dividend growth,
  # categorical flags).
  etfStockAnalyzerInfo:
    type: ['string', 'null']
    description: 'JSON string with the full EtfStockAnalyzerInfo row (all returns/CAGRs, MA stack, RSI, ATH/ATL, 52w distances, beta windows, sortino/sharpe/atr, liquidity, dividend growth fields, leverage/options/region flags).'

  # From EtfMorAnalyzerInfo — narrow slice. Only fields that are reliably populated by the
  # upstream Mor scrape AND directly inform the forward read. The `analysis` block
  # (medalistRating, headline, sections) is intentionally omitted because the scrape does
  # not consistently populate it.
  etfMorAnalyzerInfo:
    type: ['string', 'null']
    description: 'JSON string with strategyText, overviewCategory, overviewStyleBox, overviewSecYield, overviewTtmYield, returnsAnnual, returnsTrailing. The Mor `analysis` block (sections / medalistRating / headline) is omitted because it is unreliable in the upstream scrape.'

  # From EtfMorRiskInfo — only the 3-Yr and 5-Yr risk periods. The 10-Yr window belongs to
  # the Risk Analysis report.
  etfMorRiskInfo:
    type: ['string', 'null']
    description: 'JSON string with riskPeriods limited to 3-Yr and 5-Yr (each carrying portfolioRiskScore, morAnalyzerRiskReturn, riskAndVolatilityMeasures, marketVolatilityMeasures with captureRatios + drawdown + drawdownDates). The 10-Yr period is excluded.'

  # From EtfMorPortfolioInfo — the richest source for holdings mix + style/sector/credit positioning.
  # Holdings tail is capped at top 10; ESG and turnover fields on the summary are excluded.
  etfMorPortfolioInfo:
    type: ['string', 'null']
    description: 'JSON string with assetAllocation, styleMeasures, fixedIncomeStyle, sectorExposure, bondBreakdown, plus the holdings block with the holdings array capped at the top 10 by weight and ESG / turnover fields stripped from the summary.'

required:
  - name
  - symbol
  - exchange
  - categoryKey
  - factorAnalysisArray
  - assetClass
  - fundCategory
  - groupKey
