$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: false
properties:
  name:
    type: string
    description: 'The full name of the ETF (e.g., SPDR S&P 500 ETF Trust).'
  symbol:
    type: string
    description: 'The ETF ticker symbol (e.g., SPY).'
  exchange:
    type: string
    description: 'Exchange code (e.g., NYSEARCA, NASDAQ).'
  categoryKey:
    type: string
    enum: ['PerformanceAndReturns']
    description: 'The analysis category being evaluated.'
  factorAnalysisArray:
    type: array
    description: 'Array of factors to analyze for this category.'
    items:
      type: object
      properties:
        factorAnalysisKey:
          type: string
          description: 'Unique identifier of the factor.'
        factorAnalysisTitle:
          type: string
          description: 'Readable title of the factor.'
        factorAnalysisDescription:
          type: string
          description: 'Short explanation of what this factor represents and why it matters.'
        factorAnalysisMetrics:
          type: string
          description: 'Comma-separated list of key metrics used for evaluating this factor.'
      required:
        - factorAnalysisKey
        - factorAnalysisTitle
        - factorAnalysisDescription

  # From EtfStockAnalyzerInfo — returns & CAGR data
  stockAnalyzerReturns:
    type: string
    description: 'JSON string with period returns (1m through 20y), CAGR values (1y through 20y), YTD returns, and change metrics from StockAnalyzer.'

  # From EtfStockAnalyzerInfo — moving averages & momentum
  stockAnalyzerTechnicals:
    type: string
    description: 'JSON string with moving averages (MA20, MA50, MA150, MA200), MA change percentages, RSI (daily/weekly/monthly), stock price, and ATH/ATL data.'

  # From EtfMorAnalyzerInfo — Mor returns
  morReturns:
    type: string
    description: 'JSON string with Mor annual and trailing returns data, including fund vs category vs index comparisons across multiple periods.'

  # From EtfMorAnalyzerInfo — overview context
  morOverview:
    type: string
    description: 'JSON string with Mor overview: category, style box, NAV, one-day return, total assets, strategy text, and index name.'

  # From EtfFinancialInfo — basic financial context
  financialSummary:
    type: string
    description: 'JSON string with AUM, beta, 52-week high/low, volume, and holdings count for context.'

  # Asset class identifier — kept for analytical context and prompt framing
  assetClass:
    type: string
    description: 'The ETF asset class (e.g., Equity, Fixed Income, Alternatives, Commodity, Asset Allocation, Currency). Informs analysis tone and thresholds; factor selection itself is driven by groupKey.'

  # Fund category — the Mor category string for this ETF (e.g., Large Blend, High Yield Bond).
  fundCategory:
    type: ['string', 'null']
    description: 'The Mor fund category (e.g., Large Blend, Technology, High Yield Bond). Provides peer-comparison context.'

  # ETF group — derived from fundCategory via etf-analysis-categories.json and drives which factors are selected.
  groupKey:
    type: string
    description: 'The ETF group key (e.g., broad-equity, sector-thematic-equity, fixed-income-investment-grade, derivative-income). Determines which factors from the category config apply to this fund.'

  # Human-readable group name (matches EtfGroup.name in etf-analysis-categories.json) — useful for prompt phrasing.
  groupName:
    type: string
    description: 'Display name of the ETF group (e.g., "Broad Equity", "Sector, Thematic & Emerging-Market Equity"). Mirrors groupKey but is shown to the LLM in plain English.'

  # All categories belonging to the same group, joined with ", ". Lets the LLM treat sibling categories as fair peers for comparison.
  groupCategories:
    type: string
    description: 'Comma-separated list of every Mor fund category that maps to this group. Some categories are very similar — the LLM should treat them as a valid peer set for category-level comparisons.'

  # Optional Mor-category-level instructions for this analysis category, sourced from
  # etf-analysis-categories.json → categories[].categoryInstructions[<analysisCategory>].
  # Renders alongside the per-factor group instructions to give the LLM a category-specific
  # lens (e.g. covered-call levers for "Derivative Income"). Null when the fund's category
  # has no override registered for this analysis category.
  categoryInstructions:
    type: ['string', 'null']
    description: 'Optional Mor-category-level prompt instructions for this analysis category (e.g., covered-call levers when the fund category is "Derivative Income"). Null when no override is registered.'

  # Benchmark index name — sourced from EtfStockAnalyzerInfo.indexName; may be null when the upstream data does not carry an index reference.
  indexName:
    type: ['string', 'null']
    description: 'The benchmark index this ETF tracks (e.g., "S&P 500", "MSCI EAFE"). Group instructions reference this directly so the LLM can name the actual benchmark. May be null when not provided by upstream data — in that case the LLM picks the most suitable benchmark for the fund.'

  # P0 — Yield & income data (critical for bond and income ETFs)
  yieldAndIncome:
    type: string
    description: 'JSON string with dividend yield, SEC yield, TTM yield, payout frequency, dividend TTM, dividend growth rates (3y/5y), and dividend-paying years (divYears, divGrYears). Critical for bond and income ETFs where yield is the primary reason investors buy the fund.'

  # P1 — Additional context for performance analysis
  fundContext:
    type: string
    description: 'JSON string with expense ratio (explains benchmark tracking drag), inception date (handles young fund evaluation), and style box (detects category/style mismatches).'

  # From EtfMorAnalyzerInfo + EtfStockAnalyzerInfo + EtfFinancialInfo — scale and tradability
  # snapshot used by the `aum_size` factor. Surfaces the corroborating size signals
  # (overviewTotalAssets, sharesOut) plus the trading-friction signals (avgVolume, dollarVol,
  # marketBidAskSpread, marketVolumeAvg) so the LLM can judge whether AUM scale is
  # translating into retail-usable liquidity without needing web lookup for these fields.
  marketScaleAndTradability:
    type: string
    description: 'JSON string with overviewTotalAssets, sharesOut (corroborating size signals) plus marketBidAskSpread, marketVolumeAvg, avgVolume, dollarVol (trading-friction signals) used by `aum_size`. Headline aum stays in `financialSummary`.'

required:
  - name
  - symbol
  - exchange
  - categoryKey
  - factorAnalysisArray
  - stockAnalyzerReturns
  - stockAnalyzerTechnicals
  - morReturns
  - morOverview
  - financialSummary
  - marketScaleAndTradability
  - assetClass
  - fundCategory
  - groupKey
