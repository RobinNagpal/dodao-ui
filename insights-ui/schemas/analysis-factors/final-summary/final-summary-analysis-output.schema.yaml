$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: false
properties:
  finalSummary:
    type: string
    description: >-
      Markdown, two paragraphs of 3–4 lines each separated by a blank line (a
      double newline "\n\n" in the JSON string value) so each renders as a distinct
      paragraph. Do NOT use literal "Paragraph 1:" / "Paragraph 2:" labels. The first
      paragraph describes the company's business model and rates its current state
      (excellent / very good / good / fair / bad / very bad) with a brief supporting
      reason. The second paragraph covers how the company compares with its competition
      and ends with a conservative, actionable investor takeaway sentence (e.g.
      "Suitable for long-term investors seeking growth" or "High risk — best to avoid
      until profitability improves").
  metaDescription:
    type: string
    description: >-
      A concise SEO meta description (maximum 160 characters, no introductory
      text) that is compelling and informative for search engines. Include key
      information about the company and its overall analysis conclusion.
  aboutReport:
    type: string
    description: >-
      A unique 2–3 sentence introduction for the stock analysis report, rewritten
      from the base stock information with varied structure and vocabulary to avoid
      duplicate content penalties. Tone must be professional, insightful, and
      authoritative.
required:
  - finalSummary
  - metaDescription
  - aboutReport
