$schema: 'http://json-schema.org/draft-07/schema#'
type: object
additionalProperties: false
properties:
  name:
    type: string
    description: 'The full name of the company or REIT being analyzed (e.g., AvalonBay Communities Inc.).'
  symbol:
    type: string
    description: 'The stock ticker symbol of the company or REIT (e.g., AVB).'
  exchange:
    type: string
    description: 'Exchange code, e.g. "NASDAQ" or "NYSE"'
  industryKey:
    type: string
    description: 'The broad industry the stock belongs to (e.g., REITS).'
  industryName:
    type: string
    description: 'Name of the industry'
  industryDescription:
    type: string
    description: 'A few lines explaining the industry'
  subIndustryKey:
    type: string
    description: 'The specific sub-industry of the stock (e.g., OFFICE_REITS).'
  subIndustryName:
    type: string
    description: 'Name of the sub-industry'
  subIndustryDescription:
    type: string
    description: 'A few lines explaining the sub-industry'
  valuationReportDateDisplay:
    type: string
    description: 'Report/evaluation date to use in prose (e.g. Month D, YYYY). Must match when this generation ran.'
  lastClosePrice:
    type: number
    nullable: true
    description: 'Last close price from the stock analyzer summary (same as Current Price on the site). Null if unavailable.'
  marketSnapshotFetchedAt:
    type: string
    nullable: true
    description: 'ISO 8601 timestamp when the market summary snapshot was last updated from the data source.'
  categoryKey:
    type: string
    enum: ['BusinessAndMoat', 'FinancialStatementAnalysis', 'PastPerformance', 'FutureGrowth', 'FairValue']
    description: 'The category being analyzed.'
  factorAnalysisArray:
    type: array
    description: 'Array of factor definitions under this category.'
    items:
      type: object
      properties:
        factorAnalysisKey:
          type: string
          description: 'Unique identifier for the factor in SCREAMING_SNAKE_CASE.'
        factorAnalysisTitle:
          type: string
          description: 'Readable title of the factor.'
        factorAnalysisDescription:
          type: string
          description: 'Short, 1–2 sentence plain-English explanation of what this factor represents and why it matters to investors.'
        factorAnalysisMetrics:
          type: string
          description: 'Optional comma-separated list of key metrics used for evaluating this factor.'
      required:
        - factorAnalysisKey
        - factorAnalysisTitle
        - factorAnalysisDescription

  priorCategoryAnalyses:
    type: array
    description: 'Summaries and factor-level explanations from other category analyses for this ticker.'
    items:
      type: object
      properties:
        categoryKey:
          type: string
          enum: ['BusinessAndMoat', 'FinancialStatementAnalysis', 'PastPerformance', 'FutureGrowth']
          description: 'Source category for the included analysis.'
        overallAnalysisDetails:
          type: string
          description: 'Detailed write-up for the category.'
        factorResults:
          type: array
          description: 'Factor-level results with explanations and verdicts.'
          items:
            type: object
            properties:
              factorAnalysisKey:
                type: string
              factorAnalysisTitle:
                type: string
              oneLineExplanation:
                type: string
              detailedExplanation:
                type: string
              result:
                type: string
                enum: ['Pass', 'Fail']
            required:
              - factorAnalysisKey
              - factorAnalysisTitle
              - oneLineExplanation
              - detailedExplanation
              - result
      required:
        - categoryKey
        - overallAnalysisDetails
        - factorResults

required:
  - name
  - symbol
  - exchange
  - industryKey
  - subIndustryKey
  - categoryKey
  - factorAnalysisArray
  - priorCategoryAnalyses
  - industryDescription
  - subIndustryDescription
  - industryName
  - subIndustryName
  - valuationReportDateDisplay
  - lastClosePrice
  - marketSnapshotFetchedAt
