<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Sakura vs. The Infection — Anime Survival</title>
<style>
  :root {
    --pink: #ff8fc7;
    --pink-deep: #e85aa0;
    --mint: #7ef0d0;
    --ink: #2b2140;
    --panel: rgba(43, 33, 64, 0.82);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(circle at 50% 20%, #3a2a5c 0%, #1c1530 60%, #120c22 100%);
    font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #game {
    image-rendering: auto;
    background: #20183a;
    box-shadow: 0 0 60px rgba(255, 143, 199, 0.25), 0 0 0 2px rgba(255,143,199,0.35);
    border-radius: 14px;
    touch-action: none;
    max-width: 100vw; max-height: 100vh;
  }
  #hint {
    position: fixed; bottom: 8px; left: 0; right: 0;
    text-align: center; font-size: 12px; color: rgba(255,255,255,0.45);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="900" height="640"></canvas></div>
<div id="hint">Move: WASD / Arrows&nbsp; · &nbsp;Aim: Mouse&nbsp; · &nbsp;Shoot: Click / Space&nbsp; · &nbsp;Dash: Shift</div>
<script>
(() => {
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

// ---------------------------------------------------------------------------
// Input
// ---------------------------------------------------------------------------
const keys = {};
const mouse = { x: W / 2, y: H / 2, down: false };

addEventListener("keydown", (e) => {
  keys[e.key.toLowerCase()] = true;
  if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(e.key.toLowerCase())) e.preventDefault();
  if (e.key === "Enter") game.onConfirm();
  if (e.key === " ") game.onConfirm();
});
addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

function canvasPos(evt) {
  const r = canvas.getBoundingClientRect();
  const t = evt.touches ? evt.touches[0] : evt;
  return {
    x: (t.clientX - r.left) * (W / r.width),
    y: (t.clientY - r.top) * (H / r.height),
  };
}
canvas.addEventListener("mousemove", (e) => { const p = canvasPos(e); mouse.x = p.x; mouse.y = p.y; });
canvas.addEventListener("mousedown", (e) => { mouse.down = true; game.onConfirm(); });
canvas.addEventListener("mouseup", () => { mouse.down = false; });
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); const p = canvasPos(e); mouse.x = p.x; mouse.y = p.y; mouse.down = true; game.onConfirm(); }, { passive: false });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); const p = canvasPos(e); mouse.x = p.x; mouse.y = p.y; }, { passive: false });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); mouse.down = false; }, { passive: false });

// ---------------------------------------------------------------------------
// Tiny WebAudio sound helper (no external files)
// ---------------------------------------------------------------------------
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  return AC;
}
function beep(freq, dur, type = "sine", vol = 0.12) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(ac.destination);
  const t = ac.currentTime;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur);
}
const SFX = {
  shoot: () => beep(720, 0.08, "triangle", 0.08),
  hit:   () => beep(180, 0.12, "square", 0.10),
  hurt:  () => beep(110, 0.20, "sawtooth", 0.14),
  pickup:() => { beep(660, 0.08, "sine", 0.12); setTimeout(() => beep(990, 0.10, "sine", 0.12), 70); },
  win:   () => { [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f,0.18,"triangle",0.12), i*140)); },
  lose:  () => { [392,330,262,196].forEach((f,i) => setTimeout(() => beep(f,0.25,"sawtooth",0.12), i*160)); },
  boss:  () => beep(70, 0.5, "sawtooth", 0.16),
};

// ---------------------------------------------------------------------------
// Utility
// ---------------------------------------------------------------------------
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const TAU = Math.PI * 2;

// ---------------------------------------------------------------------------
// Particles
// ---------------------------------------------------------------------------
const particles = [];
function spawnBurst(x, y, color, n = 12, speed = 4) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), s = rand(0.4, 1) * speed;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color, r: rand(2, 5) });
  }
}
function spawnHeart(x, y) {
  particles.push({ x, y, vx: rand(-0.6, 0.6), vy: rand(-2.2, -1.2), life: 1, color: "#ff9ad1", r: 7, heart: true });
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.94; p.vy *= 0.94;
    if (!p.heart) p.vy += 0.06;
    p.life -= dt * 1.6;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = clamp(p.life, 0, 1);
    if (p.heart) { drawHeartShape(p.x, p.y, p.r, p.color); }
    else { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, TAU); ctx.fill(); }
  }
  ctx.globalAlpha = 1;
}
function drawHeartShape(x, y, s, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.6);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x + s * 0.5, y - s, x, y - s * 0.3);
  ctx.bezierCurveTo(x - s * 0.5, y - s, x - s, y - s * 0.3, x, y + s * 0.6);
  ctx.fill();
}

// ---------------------------------------------------------------------------
// Floating combat text
// ---------------------------------------------------------------------------
const floaters = [];
function floatText(x, y, text, color = "#fff") { floaters.push({ x, y, text, color, life: 1 }); }
function updateFloaters(dt) {
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i]; f.y -= 0.6; f.life -= dt * 1.1;
    if (f.life <= 0) floaters.splice(i, 1);
  }
}
function drawFloaters() {
  ctx.textAlign = "center";
  for (const f of floaters) {
    ctx.globalAlpha = clamp(f.life, 0, 1);
    ctx.font = "bold 18px Trebuchet MS";
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ---------------------------------------------------------------------------
// Player — a cute chibi anime magical girl, drawn with canvas paths
// ---------------------------------------------------------------------------
const player = {
  x: W / 2, y: H / 2, r: 16, speed: 3.1,
  hp: 100, maxHp: 100,
  facing: 0, bob: 0,
  cd: 0, dashCd: 0, dashTime: 0, invuln: 0,
  reset() {
    this.x = W / 2; this.y = H / 2; this.hp = this.maxHp;
    this.cd = 0; this.dashCd = 0; this.dashTime = 0; this.invuln = 0;
  }
};

function drawPlayer() {
  const p = player;
  const t = performance.now() / 1000;
  const bob = Math.sin(t * 6) * 1.5;
  ctx.save();
  ctx.translate(p.x, p.y + bob);

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.28)";
  ctx.beginPath(); ctx.ellipse(0, 20, 15, 5, 0, 0, TAU); ctx.fill();

  // invuln flicker
  if (p.invuln > 0 && Math.floor(t * 20) % 2 === 0) ctx.globalAlpha = 0.45;

  const faceLeft = Math.cos(p.facing) < 0;
  if (faceLeft) ctx.scale(-1, 1);

  // ---- body / magical-girl dress ----
  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "#e85aa0"; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-9, 4);
  ctx.lineTo(-13, 20);
  ctx.lineTo(13, 20);
  ctx.lineTo(9, 4);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // dress ribbon
  ctx.fillStyle = "#ff8fc7";
  ctx.fillRect(-10, 14, 20, 4);

  // ---- legs ----
  ctx.strokeStyle = "#ffd9b3"; ctx.lineWidth = 4; ctx.lineCap = "round";
  const step = Math.sin(t * 12) * 3;
  ctx.beginPath(); ctx.moveTo(-5, 19); ctx.lineTo(-5 + step, 26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5, 19); ctx.lineTo(5 - step, 26); ctx.stroke();

  // ---- arm holding wand toward aim ----
  ctx.strokeStyle = "#ffd9b3"; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(6, 6); ctx.lineTo(14, 2); ctx.stroke();
  // wand
  ctx.strokeStyle = "#ffe27a"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(14, 2); ctx.lineTo(22, -4); ctx.stroke();
  // star tip
  drawStar(22, -4, 4, "#fff27a");

  // ---- head ----
  ctx.fillStyle = "#ffe1c4";
  ctx.beginPath(); ctx.arc(0, -8, 12, 0, TAU); ctx.fill();

  // ---- hair (twin-tail pink) ----
  ctx.fillStyle = "#ff8fc7";
  // back hair
  ctx.beginPath(); ctx.arc(0, -10, 13, Math.PI, TAU); ctx.fill();
  // bangs
  ctx.beginPath();
  ctx.moveTo(-12, -10);
  ctx.quadraticCurveTo(-6, -22, 0, -20);
  ctx.quadraticCurveTo(6, -22, 12, -10);
  ctx.quadraticCurveTo(7, -16, 0, -15);
  ctx.quadraticCurveTo(-7, -16, -12, -10);
  ctx.fill();
  // twin tails
  ctx.beginPath(); ctx.ellipse(-14, -6, 5, 11, 0.4, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14, -6, 5, 11, -0.4, 0, TAU); ctx.fill();
  // hair bows
  drawHeartShape(-14, -15, 4, "#ffe27a");
  drawHeartShape(14, -15, 4, "#ffe27a");

  // ---- face: big anime eyes + blush ----
  ctx.fillStyle = "#3a2150";
  ctx.beginPath(); ctx.ellipse(-4.5, -7, 2.4, 3.4, 0, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4.5, -7, 2.4, 3.4, 0, 0, TAU); ctx.fill();
  // eye shine
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(-3.7, -8, 1, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(5.3, -8, 1, 0, TAU); ctx.fill();
  // blush
  ctx.fillStyle = "rgba(255,130,170,0.55)";
  ctx.beginPath(); ctx.arc(-7, -3.5, 2.2, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -3.5, 2.2, 0, TAU); ctx.fill();
  // smile
  ctx.strokeStyle = "#c46"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, -3, 2, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawStar(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI / 2 + i * (TAU / 5);
    ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    const a2 = a + TAU / 10;
    ctx.lineTo(x + Math.cos(a2) * r * 0.45, y + Math.sin(a2) * r * 0.45);
  }
  ctx.closePath(); ctx.fill();
}

// ---------------------------------------------------------------------------
// Bullets (player magic)
// ---------------------------------------------------------------------------
const bullets = [];
function fire() {
  const a = player.facing;
  const sx = player.x + Math.cos(a) * 22;
  const sy = player.y + Math.sin(a) * 22 - 6;
  bullets.push({ x: sx, y: sy, vx: Math.cos(a) * 8.5, vy: Math.sin(a) * 8.5, r: 6, dmg: 18, life: 1.4, t: 0 });
  SFX.shoot();
}
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life -= dt; b.t += dt;
    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) { bullets.splice(i, 1); continue; }
    for (const m of enemies) {
      if (m.dead) continue;
      if (dist2(b.x, b.y, m.x, m.y) < (b.r + m.r) ** 2) {
        damageEnemy(m, b.dmg, b.x, b.y);
        bullets.splice(i, 1);
        break;
      }
    }
  }
}
function drawBullets() {
  for (const b of bullets) {
    const t = b.t * 12;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(t);
    // glow
    const g = ctx.createRadialGradient(0, 0, 1, 0, 0, b.r * 2.2);
    g.addColorStop(0, "rgba(255,255,255,0.95)");
    g.addColorStop(0.4, "rgba(255,143,199,0.85)");
    g.addColorStop(1, "rgba(255,143,199,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, b.r * 2.2, 0, TAU); ctx.fill();
    drawStar(0, 0, b.r, "#fff");
    ctx.restore();
  }
}

// ---------------------------------------------------------------------------
// Enemy bullets (boss / ranged)
// ---------------------------------------------------------------------------
const eBullets = [];
function updateEBullets(dt) {
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx; b.y += b.vy; b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) { eBullets.splice(i, 1); continue; }
    if (player.invuln <= 0 && player.dashTime <= 0 && dist2(b.x, b.y, player.x, player.y) < (b.r + player.r) ** 2) {
      hurtPlayer(b.dmg);
      eBullets.splice(i, 1);
    }
  }
}
function drawEBullets() {
  for (const b of eBullets) {
    const g = ctx.createRadialGradient(b.x, b.y, 1, b.x, b.y, b.r * 2);
    g.addColorStop(0, "rgba(180,255,150,0.95)");
    g.addColorStop(1, "rgba(80,200,90,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 2, 0, TAU); ctx.fill();
    ctx.fillStyle = "#3aa840";
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.6, 0, TAU); ctx.fill();
  }
}

// ---------------------------------------------------------------------------
// Enemies — cute-but-corrupted "infected" slimes / wisps + boss
// ---------------------------------------------------------------------------
const enemies = [];
const pickups = [];

const ENEMY_TYPES = {
  slime: { r: 16, hp: 30, speed: 1.0, dmg: 8, color: "#7be08a", score: 10 },
  wisp:  { r: 13, hp: 20, speed: 1.7, dmg: 6, color: "#9b7bff", score: 15 },
  brute: { r: 24, hp: 70, speed: 0.7, dmg: 16, color: "#56c070", score: 30 },
};

function spawnEnemy(type) {
  const def = ENEMY_TYPES[type];
  // spawn from an edge
  const side = Math.floor(rand(0, 4));
  let x, y;
  if (side === 0) { x = rand(0, W); y = -30; }
  else if (side === 1) { x = W + 30; y = rand(0, H); }
  else if (side === 2) { x = rand(0, W); y = H + 30; }
  else { x = -30; y = rand(0, H); }
  enemies.push({
    type, x, y, r: def.r, hp: def.hp, maxHp: def.hp,
    speed: def.speed * rand(0.85, 1.15), dmg: def.dmg, color: def.color,
    score: def.score, dead: false, hitFlash: 0, wob: rand(0, TAU), touchCd: 0,
  });
}

function damageEnemy(m, dmg, fx, fy) {
  m.hp -= dmg; m.hitFlash = 0.12;
  spawnBurst(fx, fy, m.color, 6, 3);
  floatText(m.x, m.y - m.r, Math.round(dmg), "#fff");
  SFX.hit();
  if (m.hp <= 0 && !m.dead) {
    m.dead = true;
    spawnBurst(m.x, m.y, m.color, 18, 5);
    game.score += m.score;
    game.kills++;
    // chance to drop a heart pickup
    if (Math.random() < 0.16) pickups.push({ x: m.x, y: m.y, r: 9, kind: "heal", t: 0 });
  }
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const m = enemies[i];
    if (m.dead) { enemies.splice(i, 1); continue; }
    m.hitFlash = Math.max(0, m.hitFlash - dt);
    m.wob += dt * 4;
    m.touchCd = Math.max(0, m.touchCd - dt);
    // move toward player
    const a = Math.atan2(player.y - m.y, player.x - m.x);
    const wob = m.type === "wisp" ? Math.sin(m.wob) * 0.5 : 0;
    m.x += Math.cos(a + wob) * m.speed;
    m.y += Math.sin(a + wob) * m.speed;
    // touch damage
    if (m.touchCd <= 0 && player.invuln <= 0 && player.dashTime <= 0 &&
        dist2(m.x, m.y, player.x, player.y) < (m.r + player.r) ** 2) {
      hurtPlayer(m.dmg); m.touchCd = 0.6;
    }
  }
}

function drawBlob(m) {
  const t = performance.now() / 1000;
  ctx.save();
  ctx.translate(m.x, m.y);
  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath(); ctx.ellipse(0, m.r * 0.8, m.r * 0.9, m.r * 0.35, 0, 0, TAU); ctx.fill();

  const flash = m.hitFlash > 0;
  const base = flash ? "#ffffff" : m.color;

  // wobbly infected body
  ctx.fillStyle = base;
  ctx.beginPath();
  const seg = 16;
  for (let i = 0; i <= seg; i++) {
    const ang = (i / seg) * TAU;
    const wob = 1 + Math.sin(ang * 3 + m.wob) * 0.10 + Math.sin(ang * 5 - t * 2) * 0.05;
    const rr = m.r * wob;
    const px = Math.cos(ang) * rr, py = Math.sin(ang) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();

  // infection veins
  ctx.strokeStyle = flash ? "#ffd0d0" : "rgba(40,90,40,0.6)";
  ctx.lineWidth = 1.5;
  for (let k = 0; k < 3; k++) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    const a = m.wob + k * 2;
    ctx.quadraticCurveTo(Math.cos(a) * m.r * 0.5, Math.sin(a) * m.r * 0.5,
                         Math.cos(a) * m.r * 0.9, Math.sin(a) * m.r * 0.9);
    ctx.stroke();
  }

  // angry eyes (cute but corrupted)
  const ey = -m.r * 0.15;
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.ellipse(-m.r * 0.32, ey, m.r * 0.22, m.r * 0.26, 0, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(m.r * 0.32, ey, m.r * 0.22, m.r * 0.26, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = "#c0245a";
  ctx.beginPath(); ctx.arc(-m.r * 0.30, ey + 1, m.r * 0.10, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(m.r * 0.34, ey + 1, m.r * 0.10, 0, TAU); ctx.fill();
  // angry brows
  ctx.strokeStyle = "#2a4020"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-m.r * 0.5, ey - m.r * 0.4); ctx.lineTo(-m.r * 0.15, ey - m.r * 0.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(m.r * 0.5, ey - m.r * 0.4); ctx.lineTo(m.r * 0.15, ey - m.r * 0.2); ctx.stroke();
  // jagged mouth
  ctx.fillStyle = "#3a1020";
  ctx.beginPath();
  ctx.moveTo(-m.r * 0.35, m.r * 0.35);
  ctx.lineTo(-m.r * 0.18, m.r * 0.5);
  ctx.lineTo(0, m.r * 0.35);
  ctx.lineTo(m.r * 0.18, m.r * 0.5);
  ctx.lineTo(m.r * 0.35, m.r * 0.35);
  ctx.closePath(); ctx.fill();

  ctx.restore();

  // hp bar for tough ones
  if (m.maxHp > 40 && m.hp < m.maxHp) drawMiniHpBar(m.x, m.y - m.r - 8, m.hp / m.maxHp, m.r * 1.6);
}

function drawMiniHpBar(x, y, frac, w) {
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(x - w / 2, y, w, 4);
  ctx.fillStyle = "#ff6b8a";
  ctx.fillRect(x - w / 2, y, w * clamp(frac, 0, 1), 4);
}

// ---------------------------------------------------------------------------
// BOSS — "The Source": a giant infection-mother monster
// ---------------------------------------------------------------------------
const boss = {
  active: false, x: W / 2, y: 150, r: 60,
  hp: 1400, maxHp: 1400, t: 0, phase: 0,
  shootCd: 0, slamCd: 0, hitFlash: 0, vx: 1.2,
  reset() {
    this.active = true; this.x = W / 2; this.y = 150; this.r = 60;
    this.hp = this.maxHp; this.t = 0; this.phase = 0;
    this.shootCd = 1.5; this.slamCd = 4; this.hitFlash = 0; this.vx = 1.4;
  }
};

function updateBoss(dt) {
  const b = boss;
  b.t += dt;
  b.hitFlash = Math.max(0, b.hitFlash - dt);
  // drift side to side
  b.x += b.vx;
  if (b.x < b.r + 20 || b.x > W - b.r - 20) b.vx *= -1;
  b.y = 140 + Math.sin(b.t * 1.2) * 30;

  // enrage as hp drops
  const frac = b.hp / b.maxHp;
  b.phase = frac < 0.33 ? 2 : frac < 0.66 ? 1 : 0;
  const rate = 1 - b.phase * 0.28;

  // ranged spore attacks
  b.shootCd -= dt;
  if (b.shootCd <= 0) {
    b.shootCd = (1.4 * rate);
    const n = 8 + b.phase * 4;
    const base = Math.atan2(player.y - b.y, player.x - b.x);
    for (let i = 0; i < n; i++) {
      const a = base + (i - (n - 1) / 2) * 0.26;
      eBullets.push({ x: b.x, y: b.y + 30, vx: Math.cos(a) * 3.2, vy: Math.sin(a) * 3.2, r: 8, dmg: 12, life: 4 });
    }
    SFX.boss();
  }

  // spawn minions periodically
  b.slamCd -= dt;
  if (b.slamCd <= 0) {
    b.slamCd = 6 * rate;
    const count = 2 + b.phase;
    for (let i = 0; i < count; i++) spawnEnemy(Math.random() < 0.5 ? "wisp" : "slime");
    floatText(b.x, b.y - b.r - 10, "The infection spreads!", "#9be88a");
  }

  // bullet collisions vs boss
  for (let i = bullets.length - 1; i >= 0; i--) {
    const bl = bullets[i];
    if (dist2(bl.x, bl.y, b.x, b.y) < (bl.r + b.r) ** 2) {
      b.hp -= bl.dmg; b.hitFlash = 0.1;
      spawnBurst(bl.x, bl.y, "#9be88a", 6, 3);
      floatText(bl.x, bl.y, Math.round(bl.dmg), "#fff");
      SFX.hit();
      bullets.splice(i, 1);
      if (b.hp <= 0) { b.hp = 0; game.bossDefeated(); }
    }
  }

  // body contact damage
  if (player.invuln <= 0 && player.dashTime <= 0 && dist2(b.x, b.y, player.x, player.y) < (b.r * 0.8 + player.r) ** 2) {
    hurtPlayer(20);
  }
}

function drawBoss() {
  const b = boss;
  const t = b.t;
  ctx.save();
  ctx.translate(b.x, b.y);

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath(); ctx.ellipse(0, b.r + 20, b.r, b.r * 0.3, 0, 0, TAU); ctx.fill();

  const flash = b.hitFlash > 0;
  const phaseTint = ["#3f9d52", "#b07d2a", "#a02f4a"][b.phase];

  // tendrils
  ctx.strokeStyle = flash ? "#fff" : phaseTint;
  ctx.lineWidth = 8; ctx.lineCap = "round";
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * TAU + Math.sin(t * 1.5 + i) * 0.2;
    const len = b.r * 1.4 + Math.sin(t * 3 + i) * 12;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(Math.cos(a) * len * 0.5, Math.sin(a) * len * 0.5 + 20,
                         Math.cos(a) * len, Math.sin(a) * len + 30);
    ctx.stroke();
  }

  // main blob body
  const grd = ctx.createRadialGradient(0, -10, 10, 0, 0, b.r);
  grd.addColorStop(0, flash ? "#ffffff" : "#bdf0a8");
  grd.addColorStop(1, flash ? "#ffd0d0" : phaseTint);
  ctx.fillStyle = grd;
  ctx.beginPath();
  const seg = 22;
  for (let i = 0; i <= seg; i++) {
    const ang = (i / seg) * TAU;
    const wob = 1 + Math.sin(ang * 3 + t * 2) * 0.08 + Math.sin(ang * 6 - t) * 0.04;
    const rr = b.r * wob;
    const px = Math.cos(ang) * rr, py = Math.sin(ang) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fill();

  // pulsing infected core
  ctx.fillStyle = `rgba(255,80,110,${0.4 + Math.sin(t * 4) * 0.25})`;
  ctx.beginPath(); ctx.arc(0, 6, b.r * 0.4, 0, TAU); ctx.fill();

  // many eyes (creepy-cute)
  const eyes = [[-25, -12], [25, -12], [0, -22], [-12, 4], [12, 4]];
  for (const [ex, ey] of eyes) {
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.ellipse(ex, ey, 9, 11, 0, 0, TAU); ctx.fill();
    const look = Math.atan2(player.y - (b.y + ey), player.x - (b.x + ex));
    ctx.fillStyle = "#a0203f";
    ctx.beginPath(); ctx.arc(ex + Math.cos(look) * 3, ey + Math.sin(look) * 3, 4.5, 0, TAU); ctx.fill();
  }
  // big jagged grin
  ctx.fillStyle = "#3a1020";
  ctx.beginPath();
  ctx.moveTo(-30, 28);
  for (let i = 0; i <= 6; i++) {
    const xx = -30 + i * 10;
    ctx.lineTo(xx, 28 + (i % 2 ? 12 : 0));
  }
  ctx.lineTo(30, 28); ctx.closePath(); ctx.fill();

  ctx.restore();
}

// ---------------------------------------------------------------------------
// Pickups
// ---------------------------------------------------------------------------
function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i]; p.t += dt;
    if (dist2(p.x, p.y, player.x, player.y) < (p.r + player.r + 6) ** 2) {
      player.hp = clamp(player.hp + 20, 0, player.maxHp);
      floatText(player.x, player.y - 24, "+20", "#9be88a");
      spawnHeart(player.x, player.y - 10);
      SFX.pickup();
      pickups.splice(i, 1);
    }
  }
}
function drawPickups() {
  for (const p of pickups) {
    const s = 9 + Math.sin(p.t * 5) * 1.5;
    drawHeartShape(p.x, p.y, s, "#ff7eb3");
    ctx.globalAlpha = 0.4;
    drawHeartShape(p.x, p.y, s + 4, "#ff7eb3");
    ctx.globalAlpha = 1;
  }
}

// ---------------------------------------------------------------------------
// Player damage
// ---------------------------------------------------------------------------
function hurtPlayer(dmg) {
  if (player.invuln > 0 || player.dashTime > 0) return;
  player.hp -= dmg;
  player.invuln = 0.7;
  game.shake = 8;
  spawnBurst(player.x, player.y, "#ff8fc7", 10, 4);
  floatText(player.x, player.y - 26, "-" + dmg, "#ff6b8a");
  SFX.hurt();
  if (player.hp <= 0) { player.hp = 0; game.lose(); }
}

// ---------------------------------------------------------------------------
// Background — drifting infection spores + grid floor
// ---------------------------------------------------------------------------
const spores = Array.from({ length: 40 }, () => ({ x: rand(0, W), y: rand(0, H), r: rand(1, 3), s: rand(0.2, 0.8) }));
function drawBackground() {
  // floor grid
  ctx.strokeStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 45) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 45) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // infection fog level
  const inf = game.infection;
  if (inf > 0) {
    const g = ctx.createLinearGradient(0, H, 0, H - inf * H);
    g.addColorStop(0, "rgba(90,180,90,0.18)");
    g.addColorStop(1, "rgba(90,180,90,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
  // spores
  ctx.fillStyle = "rgba(150,230,140,0.5)";
  for (const s of spores) {
    s.y += s.s; if (s.y > H) { s.y = -5; s.x = rand(0, W); }
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.fill();
  }
}

// ---------------------------------------------------------------------------
// HUD
// ---------------------------------------------------------------------------
function drawHUD() {
  // health bar
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  roundRect(16, 16, 220, 26, 8); ctx.fill();
  ctx.fillStyle = "#ff6b8a";
  roundRect(20, 20, 212 * (player.hp / player.maxHp), 18, 6); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.font = "bold 13px Trebuchet MS"; ctx.textAlign = "left";
  ctx.fillText("♥ " + Math.ceil(player.hp) + "/" + player.maxHp, 28, 33);

  // dash indicator
  ctx.fillStyle = player.dashCd <= 0 ? "#7ef0d0" : "rgba(255,255,255,0.25)";
  ctx.font = "bold 13px Trebuchet MS";
  ctx.fillText(player.dashCd <= 0 ? "⚡ DASH READY" : "⚡ ...", 16, 60);

  // score / wave
  ctx.textAlign = "right";
  ctx.fillStyle = "#fff"; ctx.font = "bold 16px Trebuchet MS";
  ctx.fillText("Score " + game.score, W - 16, 30);
  ctx.fillStyle = "#ffe27a"; ctx.font = "bold 13px Trebuchet MS";
  ctx.fillText(game.stageLabel(), W - 16, 50);

  // boss bar
  if (boss.active) {
    const bw = 520, bx = (W - bw) / 2, by = H - 40;
    ctx.fillStyle = "rgba(0,0,0,0.5)"; roundRect(bx - 4, by - 4, bw + 8, 26, 8); ctx.fill();
    ctx.fillStyle = "#5a8b3a"; roundRect(bx, by, bw, 18, 6); ctx.fill();
    ctx.fillStyle = "#9be84a"; roundRect(bx, by, bw * (boss.hp / boss.maxHp), 18, 6); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "bold 14px Trebuchet MS";
    ctx.fillText("THE SOURCE — Mother of the Infection", W / 2, by - 10);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------------------------------------------------------------------------
// Game / state machine
// ---------------------------------------------------------------------------
const STAGES = [
  { name: "The Outskirts",   waves: [{ slime: 5 }, { slime: 4, wisp: 2 }, { slime: 4, wisp: 3, brute: 1 }],
    story: "A strange green fog crept over Sakura Town.\nThe gentle creatures have turned monstrous...\nYou are Hana — find where it began." },
  { name: "The Sick Forest", waves: [{ wisp: 4, slime: 3 }, { brute: 2, wisp: 3 }, { slime: 5, wisp: 4, brute: 2 }],
    story: "The forest pulses with corruption.\nThe spores grow thicker the deeper you go.\nThe source must be close now..." },
  { name: "The Hollow Core", waves: [{ brute: 2, wisp: 4 }, { slime: 6, brute: 2 }, { wisp: 6, brute: 3 }],
    story: "At the heart of the rot, something enormous breathes.\nThis is where the infection was born.\nFace THE SOURCE — and end it." },
];

const game = {
  state: "title", // title, story, playing, stageclear, boss, win, gameover
  stage: 0, wave: 0,
  toSpawn: [], spawnTimer: 0,
  score: 0, kills: 0, infection: 0.15,
  shake: 0, flash: 0, timer: 0,
  msg: "", msgTimer: 0,

  start() {
    this.stage = 0; this.score = 0; this.kills = 0; this.infection = 0.15;
    player.reset();
    enemies.length = bullets.length = eBullets.length = pickups.length = particles.length = floaters.length = 0;
    boss.active = false;
    this.enterStory();
  },

  enterStory() { this.state = "story"; this.timer = 0; },

  beginStage() {
    this.state = "playing"; this.wave = 0; enemies.length = 0;
    this.loadWave();
  },

  loadWave() {
    const stage = STAGES[this.stage];
    const waveDef = stage.waves[this.wave];
    this.toSpawn = [];
    for (const [type, n] of Object.entries(waveDef)) for (let i = 0; i < n; i++) this.toSpawn.push(type);
    // shuffle
    this.toSpawn.sort(() => Math.random() - 0.5);
    this.spawnTimer = 0;
    this.flashMsg("WAVE " + (this.wave + 1) + " / " + stage.waves.length);
  },

  stageLabel() {
    if (this.state === "boss") return "BOSS — The Source";
    const s = STAGES[this.stage];
    return s ? s.name + "  ·  Wave " + (this.wave + 1) + "/" + s.waves.length : "";
  },

  flashMsg(text) { this.msg = text; this.msgTimer = 1.8; },

  waveCleared() {
    const stage = STAGES[this.stage];
    this.wave++;
    this.infection = clamp(this.infection + 0.08, 0, 0.9);
    if (this.wave < stage.waves.length) {
      setTimeout(() => { if (this.state === "playing") this.loadWave(); }, 600);
      this.flashMsg("Wave cleared! +heal");
      player.hp = clamp(player.hp + 15, 0, player.maxHp);
    } else {
      // stage finished
      if (this.stage < STAGES.length - 1) {
        this.stage++;
        player.hp = clamp(player.hp + 35, 0, player.maxHp);
        this.enterStory();
      } else {
        this.startBoss();
      }
    }
  },

  startBoss() {
    this.state = "boss";
    enemies.length = 0; eBullets.length = 0;
    boss.reset();
    this.infection = 0.95;
    this.flashMsg("YOU FOUND THE SOURCE!");
    SFX.boss();
  },

  bossDefeated() {
    boss.active = false;
    for (let i = 0; i < 60; i++) setTimeout(() => spawnBurst(rand(0, W), rand(0, H), ["#ff8fc7","#ffe27a","#7ef0d0"][i%3], 10, 6), i * 18);
    this.flash = 1;
    this.state = "win";
    SFX.win();
  },

  lose() { this.state = "gameover"; SFX.lose(); },

  onConfirm() {
    if (audio() && AC.state === "suspended") AC.resume();
    if (this.state === "title") { this.start(); }
    else if (this.state === "story") { this.beginStage(); }
    else if (this.state === "win" || this.state === "gameover") { this.state = "title"; }
  },

  update(dt) {
    updateParticles(dt);
    updateFloaters(dt);
    this.shake *= 0.85;
    this.flash = Math.max(0, this.flash - dt * 0.6);
    if (this.msgTimer > 0) this.msgTimer -= dt;
    this.timer += dt;

    if (this.state !== "playing" && this.state !== "boss") return;

    // player control
    updatePlayer(dt);
    updateBullets(dt);
    updateEBullets(dt);
    updateEnemies(dt);
    updatePickups(dt);

    if (this.state === "playing") {
      // spawn queue
      if (this.toSpawn.length > 0) {
        this.spawnTimer -= dt;
        if (this.spawnTimer <= 0) {
          spawnEnemy(this.toSpawn.pop());
          this.spawnTimer = rand(0.35, 0.8);
        }
      } else if (enemies.length === 0) {
        this.waveCleared();
      }
    } else if (this.state === "boss") {
      updateBoss(dt);
    }
  },
};

function updatePlayer(dt) {
  const p = player;
  p.cd = Math.max(0, p.cd - dt);
  p.dashCd = Math.max(0, p.dashCd - dt);
  p.invuln = Math.max(0, p.invuln - dt);

  // aim
  p.facing = Math.atan2(mouse.y - p.y, mouse.x - p.x);

  // movement vector
  let mx = 0, my = 0;
  if (keys["a"] || keys["arrowleft"]) mx -= 1;
  if (keys["d"] || keys["arrowright"]) mx += 1;
  if (keys["w"] || keys["arrowup"]) my -= 1;
  if (keys["s"] || keys["arrowdown"]) my += 1;
  const len = Math.hypot(mx, my) || 1;
  mx /= len; my /= len;

  // dash
  if (p.dashTime > 0) {
    p.dashTime -= dt;
    p.x += p.dashDir.x * 9;
    p.y += p.dashDir.y * 9;
    if (Math.random() < 0.6) spawnBurst(p.x, p.y, "#bdf0ff", 2, 1.5);
  } else {
    p.x += mx * p.speed;
    p.y += my * p.speed;
    if ((keys["shift"]) && p.dashCd <= 0 && (mx || my)) {
      p.dashTime = 0.16; p.dashCd = 1.1; p.invuln = Math.max(p.invuln, 0.22);
      p.dashDir = { x: mx, y: my };
      beep(520, 0.12, "sine", 0.08);
    }
  }
  p.x = clamp(p.x, 18, W - 18);
  p.y = clamp(p.y, 18, H - 26);

  // shoot
  if ((mouse.down || keys[" "]) && p.cd <= 0) { fire(); p.cd = 0.22; }
}

// ---------------------------------------------------------------------------
// Screens
// ---------------------------------------------------------------------------
function drawCenterText(lines, opts = {}) {
  ctx.textAlign = "center";
  let y = opts.y || H / 2;
  for (const ln of lines) {
    ctx.font = ln.font || "20px Trebuchet MS";
    ctx.fillStyle = ln.color || "#fff";
    ctx.fillText(ln.t, W / 2, y);
    y += ln.gap || 30;
  }
}

function drawTitle() {
  drawBackground();
  // decorative big heroine, drawn at canvas center
  ctx.save();
  ctx.translate(W / 2, H / 2 - 50);
  ctx.scale(2.8, 2.8);
  const tmpx = player.x, tmpy = player.y, tmpf = player.facing, tmpi = player.invuln;
  player.x = 0; player.y = 0; player.facing = -0.4; player.invuln = 0;
  drawPlayer();
  player.x = tmpx; player.y = tmpy; player.facing = tmpf; player.invuln = tmpi;
  ctx.restore();

  drawCenterText([
    { t: "SAKURA vs. THE INFECTION", font: "bold 40px Trebuchet MS", color: "#ff8fc7", gap: 36 },
    { t: "a cute anime survival quest", font: "italic 18px Trebuchet MS", color: "#ffd9ec", gap: 50 },
  ], { y: H / 2 + 70 });

  const pulse = 0.6 + Math.sin(performance.now() / 300) * 0.4;
  ctx.globalAlpha = pulse;
  drawCenterText([{ t: "▶  Click / Press SPACE to begin", font: "bold 22px Trebuchet MS", color: "#7ef0d0" }], { y: H - 80 });
  ctx.globalAlpha = 1;
  drawCenterText([{ t: "WASD move · Mouse aim · Click shoot · Shift dash", font: "14px Trebuchet MS", color: "rgba(255,255,255,0.5)" }], { y: H - 40 });
}

function drawStoryScreen() {
  drawBackground();
  const s = STAGES[this.stage] || STAGES[0];
  const lines = s.story.split("\n");
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  roundRect(W/2 - 320, H/2 - 130, 640, 260, 16); ctx.fill();
  drawCenterText([
    { t: "STAGE " + (game.stage + 1), font: "bold 18px Trebuchet MS", color: "#ffe27a", gap: 30 },
    { t: s.name, font: "bold 34px Trebuchet MS", color: "#ff8fc7", gap: 46 },
  ], { y: H/2 - 80 });
  ctx.textAlign = "center";
  let y = H/2 - 10;
  for (const ln of lines) { ctx.font = "18px Trebuchet MS"; ctx.fillStyle = "#ffeaf5"; ctx.fillText(ln, W/2, y); y += 28; }
  const pulse = 0.6 + Math.sin(performance.now() / 300) * 0.4;
  ctx.globalAlpha = pulse;
  drawCenterText([{ t: "▶  Click / SPACE to enter", font: "bold 18px Trebuchet MS", color: "#7ef0d0" }], { y: H/2 + 110 });
  ctx.globalAlpha = 1;
}

function drawWin() {
  drawBackground();
  drawCenterText([
    { t: "✦ THE INFECTION IS CLEANSED ✦", font: "bold 36px Trebuchet MS", color: "#7ef0d0", gap: 44 },
    { t: "Hana defeated The Source.", font: "22px Trebuchet MS", color: "#fff", gap: 32 },
    { t: "Sakura Town blooms again. 🌸", font: "20px Trebuchet MS", color: "#ff8fc7", gap: 48 },
    { t: "Final Score: " + game.score + "   ·   Monsters purified: " + game.kills, font: "bold 20px Trebuchet MS", color: "#ffe27a", gap: 50 },
    { t: "Click / SPACE to play again", font: "16px Trebuchet MS", color: "rgba(255,255,255,0.6)" },
  ], { y: H/2 - 80 });
}

function drawGameOver() {
  drawBackground();
  drawCenterText([
    { t: "YOU WERE OVERWHELMED...", font: "bold 36px Trebuchet MS", color: "#ff6b8a", gap: 44 },
    { t: "The infection spreads unchecked.", font: "20px Trebuchet MS", color: "#fff", gap: 44 },
    { t: "Score: " + game.score + "   ·   Monsters defeated: " + game.kills, font: "bold 20px Trebuchet MS", color: "#ffe27a", gap: 50 },
    { t: "Click / SPACE to try again", font: "16px Trebuchet MS", color: "rgba(255,255,255,0.6)" },
  ], { y: H/2 - 70 });
}

// ---------------------------------------------------------------------------
// Main render
// ---------------------------------------------------------------------------
function render() {
  ctx.clearRect(0, 0, W, H);

  // screen shake
  ctx.save();
  if (game.shake > 0.2) ctx.translate(rand(-game.shake, game.shake), rand(-game.shake, game.shake));

  if (game.state === "title") { drawTitle(); ctx.restore(); return; }
  if (game.state === "story") { drawStoryScreen.call(game); ctx.restore(); return; }
  if (game.state === "win") { drawWin(); drawParticles(); ctx.restore(); return; }
  if (game.state === "gameover") { drawGameOver(); ctx.restore(); return; }

  // playing / boss
  drawBackground();
  drawPickups();
  // depth sort enemies by y
  enemies.slice().sort((a, b) => a.y - b.y).forEach(drawBlob);
  if (game.state === "boss") drawBoss();
  drawBullets();
  drawEBullets();
  drawPlayer();
  drawParticles();
  drawFloaters();
  ctx.restore();

  drawHUD();

  // flash overlay
  if (game.flash > 0.01) { ctx.fillStyle = `rgba(255,255,255,${game.flash * 0.6})`; ctx.fillRect(0, 0, W, H); }

  // big flash message
  if (game.msgTimer > 0) {
    ctx.globalAlpha = clamp(game.msgTimer, 0, 1);
    ctx.textAlign = "center";
    ctx.font = "bold 38px Trebuchet MS";
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#e85aa0"; ctx.lineWidth = 4;
    ctx.strokeText(game.msg, W / 2, 110);
    ctx.fillText(game.msg, W / 2, 110);
    ctx.globalAlpha = 1;
  }
}

// ---------------------------------------------------------------------------
// Loop
// ---------------------------------------------------------------------------
let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  game.update(dt);
  render();
}
requestAnimationFrame(function loop(now) { frame(now); requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
